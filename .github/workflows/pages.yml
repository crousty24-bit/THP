name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static Pages artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Module 05
        working-directory: ModulesFront/Module-05-premiere-vraie-app/game-convention-SPA
        run: |
          set -euo pipefail

          npm ci
          npm run build

      - name: Build Module 06
        working-directory: ModulesFront/Module-06-JSX-Composants-React/react-app
        run: |
          set -euo pipefail

          pnpm install --frozen-lockfile
          pnpm run build

      - name: Build Module 07
        working-directory: ModulesFront/Module-07-Lifecyle-State-Conditional/galerie-photo
        run: |
          set -euo pipefail

          pnpm install --frozen-lockfile
          pnpm run build

      - name: Build Module 08
        working-directory: ModulesFront/Module-08-ESLint/reading-tracker-app
        run: |
          set -euo pipefail

          npm ci
          npm run build

      - name: Prepare static artifact
        env:
          MODULE_05_RAWG_API_ENABLED: ${{ vars.MODULE_05_RAWG_API_ENABLED }}
          MODULE_05_RAWG_API_KEY: ${{ secrets.MODULE_05_RAWG_API_KEY }}
          MODULE_07_UNSPLASH_API_ENABLED: ${{ vars.MODULE_07_UNSPLASH_API_ENABLED }}
          MODULE_07_UNSPLASH_API_KEY: ${{ secrets.MODULE_07_UNSPLASH_API_KEY }}
        run: |
          set -euo pipefail

          rm -rf _site
          mkdir -p _site

          cp -R docs/. _site/
          cp -R ModulesFront _site/ModulesFront
          rm -rf _site/ModulesFront/Module-05-premiere-vraie-app/game-convention-SPA
          mkdir -p _site/ModulesFront/Module-05-premiere-vraie-app/game-convention-SPA
          cp -R ModulesFront/Module-05-premiere-vraie-app/game-convention-SPA/dist/. _site/ModulesFront/Module-05-premiere-vraie-app/game-convention-SPA/
          rm -rf _site/ModulesFront/Module-06-JSX-Composants-React/react-app
          mkdir -p _site/ModulesFront/Module-06-JSX-Composants-React/react-app
          cp -R ModulesFront/Module-06-JSX-Composants-React/react-app/dist/. _site/ModulesFront/Module-06-JSX-Composants-React/react-app/
          rm -rf _site/ModulesFront/Module-07-Lifecyle-State-Conditional/galerie-photo
          mkdir -p _site/ModulesFront/Module-07-Lifecyle-State-Conditional/galerie-photo
          cp -R ModulesFront/Module-07-Lifecyle-State-Conditional/galerie-photo/dist/. _site/ModulesFront/Module-07-Lifecyle-State-Conditional/galerie-photo/
          rm -rf _site/ModulesFront/Module-08-ESLint/reading-tracker-app
          mkdir -p _site/ModulesFront/Module-08-ESLint/reading-tracker-app
          cp -R ModulesFront/Module-08-ESLint/reading-tracker-app/dist/. _site/ModulesFront/Module-08-ESLint/reading-tracker-app/

          printf 'window.WEATHERBIT_CONFIG = { apiKey: "" };\n' > _site/ModulesFront/Module-03-les-API/velib/weatherbit-config.js
          printf 'window.OMDB_CONFIG = { apiKey: "" };\n' > _site/ModulesFront/Module-04-API-liste/movie-finder/omdb-config.js
          if [ "${MODULE_05_RAWG_API_ENABLED:-}" = "false" ] || [ -z "${MODULE_05_RAWG_API_KEY:-}" ]; then
            printf 'window.RAWG_CONFIG = { apiKey: "" };\n' > _site/ModulesFront/Module-05-premiere-vraie-app/game-convention-SPA/rawg-config.js
          else
            CONFIG_PATH="_site/ModulesFront/Module-05-premiere-vraie-app/game-convention-SPA/rawg-config.js"
            export MODULE_05_RAWG_API_KEY
            python3 -c 'import json, os; print("window.RAWG_CONFIG = { apiKey: " + json.dumps(os.environ["MODULE_05_RAWG_API_KEY"]) + " };")' > "$CONFIG_PATH"
          fi
          if [ "${MODULE_07_UNSPLASH_API_ENABLED:-}" = "false" ] || [ -z "${MODULE_07_UNSPLASH_API_KEY:-}" ]; then
            printf 'window.UNSPLASH_CONFIG = { apiKey: "" };\n' > _site/ModulesFront/Module-07-Lifecyle-State-Conditional/galerie-photo/unsplash-config.js
          else
            CONFIG_PATH="_site/ModulesFront/Module-07-Lifecyle-State-Conditional/galerie-photo/unsplash-config.js"
            export MODULE_07_UNSPLASH_API_KEY
            python3 -c 'import json, os; print("window.UNSPLASH_CONFIG = { apiKey: " + json.dumps(os.environ["MODULE_07_UNSPLASH_API_KEY"]) + " };")' > "$CONFIG_PATH"
          fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
