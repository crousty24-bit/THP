<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verification de grille Loto</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <section class="loto-panel" aria-labelledby="page-title">
        <div class="intro">
          <p class="label">Controle de participation</p>
          <h1 id="page-title">Verifier une grille de Loto</h1>
          <p>
            Saisis tes informations et tes 6 numeros. La page controle le
            formulaire, tire 6 nombres gagnants, puis affiche le resultat.
          </p>
        </div>

        <form id="loto-form" novalidate>
          <div class="field-grid">
            <label>
              Prenom
              <input id="firstname" name="firstname" type="text" autocomplete="given-name" />
            </label>

            <label>
              Nom
              <input id="lastname" name="lastname" type="text" autocomplete="family-name" />
            </label>
          </div>

          <label>
            Email
            <input id="email" name="email" type="email" autocomplete="email" />
          </label>

          <fieldset>
            <legend>Numeros joues</legend>
            <div class="numbers-grid">
              <input name="loto-number" type="number" min="1" max="49" aria-label="Numero 1" />
              <input name="loto-number" type="number" min="1" max="49" aria-label="Numero 2" />
              <input name="loto-number" type="number" min="1" max="49" aria-label="Numero 3" />
              <input name="loto-number" type="number" min="1" max="49" aria-label="Numero 4" />
              <input name="loto-number" type="number" min="1" max="49" aria-label="Numero 5" />
              <input name="loto-number" type="number" min="1" max="49" aria-label="Numero 6" />
            </div>
          </fieldset>

          <button type="submit">Verifier la grille</button>
        </form>

        <p id="result" class="result" role="status" aria-live="polite"></p>
      </section>
    </main>

    <script src="index.js"></script>
  </body>
</html>
